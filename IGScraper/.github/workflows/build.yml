- name: Install dependencies
  working-directory: IGScraper
  run: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt
    pip install pyinstaller

- name: Create placeholder credentials (CI only)
  working-directory: IGScraper
  run: |
    mkdir assets
    echo {"installed":{}} > assets/credentials.json

- name: Build EXE with PyInstaller
  working-directory: IGScraper
  run: |
    pyinstaller instagram_scraper.spec

- name: Debug dist folder
  run: |
    dir IGScraper\dist /s

- name: Upload EXE artifact
  uses: actions/upload-artifact@v4
  with:
    name: InstagramScraper-Windows
    path: IGScraper/dist/**/*.exe
