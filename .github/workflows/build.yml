name: Build Windows EXE
on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        working-directory: IGScraper
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create placeholder credentials (CI only)
        working-directory: IGScraper
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path assets
          '{"installed":{}}' | Out-File -FilePath assets/credentials.json -Encoding utf8

      - name: Install PyAV (includes FFmpeg binaries for H.264 decoding)
        working-directory: IGScraper
        run: pip install av


      - name: Build EXE with PyInstaller
        working-directory: IGScraper
        run: |
          pyinstaller instagram_scraper.spec

      - name: Show dist contents (DEBUG)
        working-directory: IGScraper
        shell: powershell
        run: |
          Write-Host "==== DIST ===="
          Get-ChildItem -Path dist -Recurse

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: InstagramScraper-Windows
          path: IGScraper/dist/Cansa.exe
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: InstagramScraper v1.0.${{ github.run_number }}
          files: IGScraper/dist/Cansa.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}