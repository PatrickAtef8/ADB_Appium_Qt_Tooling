name: Build Windows EXE
on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        working-directory: IGScraper
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create placeholder credentials (CI only)
        working-directory: IGScraper
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path assets
          '{"installed":{}}' | Out-File -FilePath assets/credentials.json -Encoding utf8

      - name: Verify imageformats plugin DLLs are present before build (DEBUG)
        working-directory: IGScraper
        shell: powershell
        run: |
          Write-Host "==== PyQt6 imageformats plugins ===="
          $qt6 = python -c "import PyQt6, os; print(os.path.dirname(PyQt6.__file__))"
          $pluginPath = Join-Path $qt6 "Qt6\plugins\imageformats"
          if (Test-Path $pluginPath) {
            Get-ChildItem $pluginPath
          } else {
            Write-Host "WARNING: imageformats folder not found at $pluginPath"
          }

      - name: Build EXE with PyInstaller
        working-directory: IGScraper
        run: |
          pyinstaller instagram_scraper.spec

      - name: Show dist contents (DEBUG)
        working-directory: IGScraper
        shell: powershell
        run: |
          Write-Host "==== DIST ===="
          Get-ChildItem -Path dist -Recurse

      # ←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←
      # Removed the artifact upload step → no more quota error
      # ←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: InstagramScraper v1.0.${{ github.run_number }}
          files: IGScraper/dist/Cansa.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}