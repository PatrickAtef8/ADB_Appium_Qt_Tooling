name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # Manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create placeholder credentials (CI only)
        run: |
          mkdir -p assets
          echo '{"installed":{}}' > assets/credentials.json

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller instagram_scraper.spec

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: InstagramScraper-Windows
          path: dist/InstagramScraper.exe
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "InstagramScraper v1.0.${{ github.run_number }}"
          files: dist/InstagramScraper.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
