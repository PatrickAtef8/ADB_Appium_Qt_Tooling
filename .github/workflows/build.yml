name: Build Windows EXE

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: IGScraper
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create placeholder credentials (CI only)
        working-directory: IGScraper
        run: |
          mkdir -p assets
          echo '{"installed":{}}' > assets/credentials.json

      - name: Build EXE with PyInstaller
        working-directory: IGScraper
        run: |
          pyinstaller instagram_scraper.spec

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: InstagramScraper-Windows
          path: IGScraper/dist/InstagramScraperPro.exe
          retention-days: 30
